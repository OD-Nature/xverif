interface:
  display_name: xverif-mcp
  short_description: 使用 xverif MCP tools 和托管 session，含 xdebug、xcov、xbit、xentry、xloc、xsva 与 SDK-free loop wrapper。
  default_prompt: >
    使用 xverif-mcp 调用 MCP tool 参数壳。xdebug 常规查询使用
    xverif_debug_query 的 session_id/action/args/limits/output；xcov 常规查询使用
    xverif_cov_query 的 session/action/args/limits/output。raw_request 才把完整原生
    JSON 放入 request 字段，CLI envelope 请改用 xverif-cli。
policy:
  allow_implicit_invocation: true
